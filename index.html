<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Holiday Music Universe</title>
    <style>
        :root { --accent: #ffd700; --bg: #050505; }
        body, html { 
            margin: 0; padding: 0; height: 100%; width: 100%;
            background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif;
            transition: all 1s ease; overflow: hidden;
        }
        canvas { position: fixed; top: 0; left: 0; z-index: 1; pointer-events: none; }

        .ui-layer {
            position: relative; z-index: 10; height: 100vh;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }

        .holiday-card {
            background: rgba(0, 0, 0, 0.7); backdrop-filter: blur(25px);
            padding: 50px; border-radius: 50px; border: 2px solid var(--accent);
            text-align: center; box-shadow: 0 0 80px rgba(0,0,0,1);
            max-width: 650px; width: 85%; transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        h1 { font-size: 3.5rem; margin: 15px 0; color: var(--accent); text-transform: uppercase; text-shadow: 0 0 20px var(--accent); }
        
        .timer { display: flex; gap: 20px; justify-content: center; margin-top: 30px; }
        .t-box { background: rgba(255,255,255,0.05); padding: 20px; border-radius: 25px; min-width: 90px; border: 1px solid rgba(255,255,255,0.1); }
        .t-box span { display: block; font-size: 2.8rem; font-weight: 900; }

        .menu {
            position: absolute; bottom: 40px; display: flex; gap: 15px;
            padding: 15px 30px; background: rgba(255,255,255,0.1); border-radius: 100px; backdrop-filter: blur(15px);
        }
        .m-item {
            width: 65px; height: 65px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: 0.4s; font-size: 1.8rem; background: rgba(0,0,0,0.5);
        }
        .m-item.active { background: var(--accent); color: #000; transform: scale(1.25); box-shadow: 0 0 30px var(--accent); }
        
        #audio-hint { position: absolute; top: 30px; background: var(--accent); color: #000; padding: 10px 20px; border-radius: 20px; font-weight: bold; cursor: pointer; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 0.7; } 50% { opacity: 1; } 100% { opacity: 0.7; } }
    </style>
</head>
<body>

<canvas id="mainCanvas"></canvas>

<div class="ui-layer">
    <div id="audio-hint" onclick="initAudio()">NHẤN ĐỂ BẬT NHẠC LỄ HỘI 🎵</div>
    <div class="holiday-card" id="card">
        <p id="quote" style="font-style: italic; opacity: 0.8; font-size: 1.2rem;"></p>
        <h1 id="title">CHÀO MỪNG</h1>
        <div class="timer">
            <div class="t-box"><span id="days">00</span>Ngày</div>
            <div class="t-box"><span id="hours">00</span>Giờ</div>
            <div class="t-box"><span id="mins">00</span>Phút</div>
            <div class="t-box"><span id="secs">00</span>Giây</div>
        </div>
    </div>
    <div class="menu" id="menu"></div>
</div>

<script>
    const holidays = [
        { name: "Giỗ Tổ 10/3", date: "2026-04-26", icon: "🏺", color: "#ffd700", quote: "Hào khí ngàn năm non sông Việt Nam", melody: [220, 220, 220, 165, 196, 220] },
        { name: "Giải Phóng 30/4", date: "2026-04-30", icon: "⭐", color: "#ff2121", quote: "Đất nước trọn niềm vui thống nhất", melody: [261, 329, 392, 523, 392, 523] },
        { name: "Quốc Khánh 2/9", date: "2026-09-02", icon: "🇻🇳", color: "#ffff00", quote: "Nước Việt Nam có quyền hưởng tự do", melody: [196, 261, 329, 392, 261, 196] },
        { name: "Tết Dương Lịch", date: "2027-01-01", icon: "🎊", color: "#00d4ff", quote: "Happy New Year - Vạn sự như ý!", melody: [523, 659, 783, 1046, 783, 659] },
        { name: "Tết Nguyên Đán", date: "2027-02-17", icon: "🧧", color: "#ff4757", quote: "Cung chúc tân xuân - Bình an may mắn", melody: [329, 392, 440, 392, 329, 293] }
    ];

    let current = holidays[0];
    let audioCtx = null;
    let canvas = document.getElementById('mainCanvas');
    let ctx = canvas.getContext('2d');
    let particles = [];

    function initAudio() {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === 'suspended') audioCtx.resume();
        document.getElementById('audio-hint').style.display = 'none';
        playHolidayMelody();
    }

    // --- BỘ PHÁT NHẠC ĐIỆN TỬ ---
    function playHolidayMelody() {
        if (!audioCtx) return;
        const melody = current.melody;
        let time = audioCtx.currentTime;
        
        melody.forEach((freq, i) => {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            
            // Kiểu nhạc cụ thay đổi theo theme
            osc.type = (current.color === "#ffd700") ? 'sawtooth' : 'sine';
            osc.frequency.setValueAtTime(freq, time + i * 0.4);
            
            gain.gain.setValueAtTime(0, time + i * 0.4);
            gain.gain.linearRampToValueAtTime(0.1, time + i * 0.4 + 0.1);
            gain.gain.exponentialRampToValueAtTime(0.01, time + i * 0.4 + 0.4);
            
            osc.start(time + i * 0.4);
            osc.stop(time + i * 0.4 + 0.4);
        });
    }

    function setHoliday(i) {
        current = holidays[i];
        document.querySelectorAll('.m-item').forEach(el => el.classList.remove('active'));
        document.getElementById(`m-${i}`).classList.add('active');
        document.documentElement.style.setProperty('--accent', current.color);
        document.getElementById('title').innerText = current.name;
        document.getElementById('quote').innerText = `"${current.quote}"`;
        
        if (audioCtx) playHolidayMelody();
        particles = []; // Reset hiệu ứng
    }

    // --- HIỆU ỨNG HÌNH ẢNH ---
    function loop() {
        ctx.fillStyle = 'rgba(5, 5, 5, 0.2)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Tạo hạt lung linh
        if (Math.random() < 0.1) {
            particles.push({
                x: Math.random()*canvas.width, y: canvas.height + 10,
                vx: (Math.random()-0.5)*2, vy: -Math.random()*3-1,
                a: 1, c: current.color, r: Math.random()*3+1
            });
        }

        particles.forEach((p, i) => {
            ctx.globalAlpha = p.a;
            ctx.fillStyle = p.c;
            ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2); ctx.fill();
            p.x += p.vx; p.y += p.vy; p.a -= 0.005;
            if(p.a <= 0) particles.splice(i, 1);
        });

        requestAnimationFrame(loop);
    }

    // Khởi tạo giao diện
    window.onresize = () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; };
    window.onresize();
    const menu = document.getElementById('menu');
    menu.innerHTML = holidays.map((h, i) => `<div class="m-item" onclick="setHoliday(${i})" id="m-${i}">${h.icon}</div>`).join('');
    
    setHoliday(0);
    setInterval(() => {
        const diff = new Date(current.date) - new Date();
        document.getElementById('days').innerText = Math.max(0, Math.floor(diff / 86400000));
        document.getElementById('hours').innerText = Math.max(0, Math.floor((diff / 3600000) % 24));
        document.getElementById('mins').innerText = Math.max(0, Math.floor((diff / 60000) % 60));
        document.getElementById('secs').innerText = Math.max(0, Math.floor((diff / 1000) % 60));
    }, 1000);
    loop();
</script>
</body>
</html>
